name: Release

# Trigger: push a tag like v1.0.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases
  id-token: write   # needed for Azure OIDC (Trusted Signing)

jobs:
  # ── Windows (Build + Sign + Installer) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate Windows version info resource
        working-directory: companion
        run: |
          $version = $env:RELEASE_VERSION
          $parts = $version.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]
          $versionQuad = "$version.0"
          $versionInfo = Get-Content versioninfo.json | ConvertFrom-Json
          $versionInfo.FixedFileInfo.FileVersion.Major = $major
          $versionInfo.FixedFileInfo.FileVersion.Minor = $minor
          $versionInfo.FixedFileInfo.FileVersion.Patch = $patch
          $versionInfo.FixedFileInfo.ProductVersion.Major = $major
          $versionInfo.FixedFileInfo.ProductVersion.Minor = $minor
          $versionInfo.FixedFileInfo.ProductVersion.Patch = $patch
          $versionInfo.StringFileInfo.FileVersion = $versionQuad
          $versionInfo.StringFileInfo.ProductVersion = $versionQuad
          $versionInfo | ConvertTo-Json -Depth 10 | Set-Content versioninfo.json
          (Get-Content app.manifest) -replace 'version="[^"]+"', "version=""$versionQuad""" | Set-Content app.manifest
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          go generate ./...

      - name: Build Windows exe
        working-directory: companion
        run: |
          go build -ldflags "-H windowsgui -X github.com/harshvasudeva/synctabs-companion/config.AppVersion=${{ env.RELEASE_VERSION }}" `
            -o ../dist/synctabs-companion-windows-amd64.exe .

      # ── Code Signing (Azure Trusted Signing) ───────────────────────────────
      # Prerequisites: Set up Azure Trusted Signing account and configure
      # the following GitHub repository secrets:
      #   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
      #   TRUSTED_SIGNING_ACCOUNT, TRUSTED_SIGNING_PROFILE,
      #   TRUSTED_SIGNING_ENDPOINT (e.g. https://eus.codesigning.azure.net/)
      - name: Sign Windows exe
        if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: dist/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Build NSIS Installer ────────────────────────────────────────────────
      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        working-directory: companion
        run: |
          $version = $env:RELEASE_VERSION
          (Get-Content installer.nsi) -replace '!define APP_VERSION\s+"[^"]+"', "!define APP_VERSION   `"$version`"" | Set-Content installer.nsi
          (Get-Content installer.nsi) -replace "VIProductVersion `"[^`"]+`"", "VIProductVersion `"$version.0`"" | Set-Content installer.nsi
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Sign installer
        if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: companion/dist/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            dist/synctabs-companion-windows-amd64.exe
            companion/dist/SyncTabs-Companion-Setup.exe

  # ── macOS (Apple Silicon + Intel) ─────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # macOS systray requires CGo (Xcode Command Line Tools)
      - name: Install Xcode Command Line Tools
        run: |
          xcode-select --install || true
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer || true

      - name: Build macOS arm64 (Apple Silicon)
        working-directory: companion
        run: |
          go build \
            -ldflags "-s -w -X github.com/harshvasudeva/synctabs-companion/config.AppVersion=${{ env.RELEASE_VERSION }}" \
            -o ../dist/synctabs-companion-darwin-arm64 .
        env:
          GOARCH: arm64
          CGO_ENABLED: 1

      - name: Build macOS amd64 (Intel)
        working-directory: companion
        run: |
          go build \
            -ldflags "-s -w -X github.com/harshvasudeva/synctabs-companion/config.AppVersion=${{ env.RELEASE_VERSION }}" \
            -o ../dist/synctabs-companion-darwin-amd64 .
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: clang -arch x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/synctabs-companion-darwin-arm64
            dist/synctabs-companion-darwin-amd64

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install GTK dependencies (required for systray)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Linux amd64
        working-directory: companion
        run: |
          go build \
            -ldflags "-s -w -X github.com/harshvasudeva/synctabs-companion/config.AppVersion=${{ env.RELEASE_VERSION }}" \
            -o ../dist/synctabs-companion-linux-amd64 .
        env:
          CGO_ENABLED: 1

      - name: Build .deb package
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          DEB_ROOT="dist/deb/synctabs-companion_${VERSION}_amd64"

          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/usr/local/bin"
          mkdir -p "$DEB_ROOT/usr/share/applications"

          # Binary
          cp dist/synctabs-companion-linux-amd64 "$DEB_ROOT/usr/local/bin/synctabs-companion"
          chmod +x "$DEB_ROOT/usr/local/bin/synctabs-companion"

          # control file
          cat > "$DEB_ROOT/DEBIAN/control" << EOF
          Package: synctabs-companion
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libayatana-appindicator3-1
          Maintainer: Harsh Vasudeva <harsh@example.com>
          Description: SyncTabs Companion
           Local WebSocket server for cross-browser tab sync.
           Runs as a background tray app on localhost:9234.
          EOF

          # .desktop for autostart (optional — user can enable via tray)
          cat > "$DEB_ROOT/usr/share/applications/synctabs-companion.desktop" << EOF
          [Desktop Entry]
          Name=SyncTabs Companion
          Exec=/usr/local/bin/synctabs-companion
          Icon=synctabs
          Type=Application
          Categories=Utility;
          Comment=Cross-browser tab sync companion
          EOF

          dpkg-deb --build "$DEB_ROOT" "dist/synctabs-companion_${VERSION}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            dist/synctabs-companion-linux-amd64
            dist/synctabs-companion_*_amd64.deb

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SyncTabs Companion ${{ github.ref_name }}"
          body: |
            ## SyncTabs Companion ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | **Windows Installer** | `SyncTabs-Companion-Setup.exe` |
            | Windows (standalone) | `synctabs-companion-windows-amd64.exe` |
            | macOS (Apple Silicon) | `synctabs-companion-darwin-arm64` |
            | macOS (Intel) | `synctabs-companion-darwin-amd64` |
            | Linux (x64) | `synctabs-companion-linux-amd64` |
            | Linux .deb (x64) | `synctabs-companion_*_amd64.deb` |

            ### Install
            See [README.md](https://github.com/${{ github.repository }}#readme) for full installation instructions.
          files: artifacts/**
          draft: false
          prerelease: false
